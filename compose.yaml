services:
  review-memory-init:
    build:
      context: .
      args:
        HERMES_IMAGE: ${HERMES_IMAGE:-nousresearch/hermes-agent@sha256:cd5d617d794b86ac7ac6ea084359aab53797b87ececcc19db4de210ec1e49cdc}
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        mkdir -p /review-memory
        && eneo-review-memory init --db /review-memory/review_memory.sqlite3
        && chown -R 10000:10000 /review-memory
        && chmod 0750 /review-memory
        && chmod 0640 /review-memory/review_memory.sqlite3*
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - review_memory_data:/review-memory
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m

  hermes-review:
    build:
      context: .
      args:
        HERMES_IMAGE: ${HERMES_IMAGE:-nousresearch/hermes-agent@sha256:cd5d617d794b86ac7ac6ea084359aab53797b87ececcc19db4de210ec1e49cdc}
    restart: unless-stopped
    command: gateway run
    depends_on:
      review-memory-init:
        condition: service_completed_successfully
    environment:
      TZ: "${TZ:-Europe/Stockholm}"
      WEBHOOK_ENABLED: "${WEBHOOK_ENABLED:-true}"
      WEBHOOK_PORT: "${WEBHOOK_PORT:-8644}"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:?set WEBHOOK_SECRET}"
      GH_TOKEN: "${GH_TOKEN:?set GH_TOKEN}"
      GH_PROMPT_DISABLED: "${GH_PROMPT_DISABLED:-1}"
      GITHUB_READ_TOKEN: "${GITHUB_READ_TOKEN:-}"
      ENEO_ALLOWED_REPOSITORIES: "${ENEO_ALLOWED_REPOSITORIES:?set ENEO_ALLOWED_REPOSITORIES}"
      ENEO_REVIEW_DB: /opt/data/review-memory/review_memory.sqlite3
      ENEO_REVIEW_FEEDBACK_ENABLED: "${ENEO_REVIEW_FEEDBACK_ENABLED:-false}"
      HERMES_DASHBOARD: "${HERMES_DASHBOARD:-0}"
      API_SERVER_ENABLED: "${API_SERVER_ENABLED:-false}"
      PYTHONUNBUFFERED: "1"
    expose:
      - "8644"
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # Fallback ONLY if the Dokploy Domains UI fails to route after deploy:
      # - "traefik.http.routers.eneo-review.rule=Host(`eneo-security.sundsvall.dev`)"
      # - "traefik.http.routers.eneo-review.entrypoints=websecure"
      # - "traefik.http.routers.eneo-review.tls.certResolver=letsencrypt"
      # - "traefik.http.services.eneo-review.loadbalancer.server.port=8644"
    volumes:
      - hermes_review_data:/opt/data
      - review_memory_data:/opt/data/review-memory
    # `no-new-privileges` is intentionally NOT set: it is incompatible with the
    # Hermes image's s6-overlay init, which must drop root -> hermes (uid 10000)
    # at startup. The gateway still runs unprivileged via that s6 privilege drop.
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=256m
    stop_grace_period: 90s
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8644/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "2.0"
          pids: 256
    logging:
      options:
        max-size: "10m"
        max-file: "5"

  hermes-review-feedback:
    build:
      context: .
      args:
        HERMES_IMAGE: ${HERMES_IMAGE:-nousresearch/hermes-agent@sha256:cd5d617d794b86ac7ac6ea084359aab53797b87ececcc19db4de210ec1e49cdc}
    restart: unless-stopped
    user: "10000:10000"
    entrypoint: ["/usr/local/bin/eneo-review-feedback-bridge"]
    command: ["serve", "--host", "0.0.0.0", "--port", "8645"]
    depends_on:
      review-memory-init:
        condition: service_completed_successfully
    environment:
      TZ: "${TZ:-Europe/Stockholm}"
      ENEO_REVIEW_DB: /review-memory/review_memory.sqlite3
      ENEO_FEEDBACK_WEBHOOK_SECRET: "${ENEO_FEEDBACK_WEBHOOK_SECRET:?set ENEO_FEEDBACK_WEBHOOK_SECRET}"
      ENEO_FEEDBACK_GH_TOKEN: "${ENEO_FEEDBACK_GH_TOKEN:?set ENEO_FEEDBACK_GH_TOKEN}"
      ENEO_ALLOWED_REPOSITORIES: "${ENEO_ALLOWED_REPOSITORIES:?set ENEO_ALLOWED_REPOSITORIES}"
      ENEO_FEEDBACK_ALLOWED_ACTOR_IDS: "${ENEO_FEEDBACK_ALLOWED_ACTOR_IDS:?set ENEO_FEEDBACK_ALLOWED_ACTOR_IDS}"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    expose:
      - "8645"
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # Prefer a separate Dokploy domain or path routed to service port 8645.
      # Fallback labels can mirror hermes-review with a distinct router/service.
    volumes:
      - review_memory_data:/review-memory
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec,size=64m
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8645/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
          pids: 64
    logging:
      options:
        max-size: "10m"
        max-file: "5"

networks:
  dokploy-network:
    external: true

volumes:
  hermes_review_data:
  review_memory_data:
